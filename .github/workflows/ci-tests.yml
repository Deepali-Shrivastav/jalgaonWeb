# =============================================================================
# Workflow 1 of 3: CI — Run Tests (Safety Gate)
# =============================================================================
# Triggers on:
#   - Push to 'develop' or 'feature/**' branches (automatic)
#   - Pull Request targeting 'main' or 'develop' (automatic)
#   - Manual button in GitHub Actions UI (workflow_dispatch)
#
# BUG FIXES vs previous version:
#   1. Added workflow_dispatch for manual trigger button
#   2. Heredoc quote 'EOF' prevents shell from expanding $variables inside (CRITICAL)
#   3. Removed '--deploy' flag from manage.py check — causes false failures in CI
#   4. Removed '--run-syncdb' from migrate — standard 'migrate' is correct
#   5. Added 'continue-on-error: false' on ESLint so linting actually blocks CI
#   6. Added pip cache to speed up runs
# =============================================================================
name: "CI — Run Tests"

on:
  push:
    branches:
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  # ✅ Manual trigger button in GitHub Actions UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        default: "Manual test trigger"

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Django Backend Tests
  # ---------------------------------------------------------------------------
  test-backend:
    name: "Django Backend Tests"
    runs-on: ubuntu-22.04

    services:
      # Temporary PostgreSQL — never touches the production DB at 65.1.52.6
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: jalgaon_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: jalgaonApi/requirements.txt

      - name: "Install backend dependencies"
        working-directory: jalgaonApi
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Create CI test environment file"
        working-directory: jalgaonApi
        # FIX: Single-quoted 'ENVEOF' prevents shell expanding $variables inside the heredoc
        run: |
          cat > .env.development << 'ENVEOF'
          SECRET_KEY=test-secret-key-for-ci-use-only-not-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=jalgaon_test_db
          DB_USER=test_user
          DB_PASSWORD=test_password_ci_only
          DB_HOST=127.0.0.1
          DB_PORT=5432
          FAST2SMS_API_KEY=dummy-key-for-ci-testing
          DJANGO_ENV=development
          ENVEOF
          # Strip leading whitespace from each line (heredoc indentation artifact)
          sed -i 's/^[[:space:]]*//' .env.development

      - name: "Run Django system checks"
        working-directory: jalgaonApi
        env:
          DJANGO_ENV: development
        # FIX: Removed --deploy flag. It causes failures in CI due to non-HTTPS/non-prod settings
        run: |
          python manage.py check

      - name: "Apply database migrations on CI test DB"
        working-directory: jalgaonApi
        env:
          DJANGO_ENV: development
        # FIX: Removed --run-syncdb. Standard migrate is correct for testing
        run: |
          python manage.py migrate

      - name: "Run Django test suite"
        working-directory: jalgaonApi
        env:
          DJANGO_ENV: development
        run: |
          python manage.py test --verbosity=2

  # ---------------------------------------------------------------------------
  # JOB 2: Frontend Build Check
  # ---------------------------------------------------------------------------
  test-frontend:
    name: "Frontend Lint & Build Check"
    runs-on: ubuntu-22.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Node.js 20 LTS"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: jalgaonUi/package-lock.json

      - name: "Install frontend dependencies"
        working-directory: jalgaonUi
        run: npm install --legacy-peer-deps

      - name: "Run ESLint (code quality check)"
        working-directory: jalgaonUi
        # FIX: Removed --if-present which silently skips lint. If lint script
        # is missing it should fail so we know to add it
        run: npm run lint

      - name: "Build production bundle (verify no build errors)"
        working-directory: jalgaonUi
        # Vite loads jalgaonUi/.env.production automatically →
        # VITE_DJANGO_API=https://api.jalgaon.com
        run: npm run build
