server {
    # Listen on HTTP port 80
    # After SSL is set up, certbot will update this to redirect to HTTPS
    listen 80;
    server_name api.jalgaon.com;

    # Serve Django uploaded media files directly via Nginx
    # These are user-uploaded images (profile pics, business banners, etc.)
    location /media/ {
        alias /home/ubuntu/jalgaonWeb/jalgaonApi/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Serve Django collected static files directly via Nginx
    # These are admin panel CSS/JS from 'python manage.py collectstatic'
    location /static/ {
        alias /home/ubuntu/jalgaonWeb/jalgaonApi/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Forward all other requests to Gunicorn via Unix socket
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn/gunicorn_jalgaon.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings to prevent large requests being held in memory
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }
}
