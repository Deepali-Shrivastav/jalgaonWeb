server {
    # Listen on HTTP port 80
    # After SSL is set up, certbot will update this to redirect to HTTPS
    listen 80;
    server_name www.jalgaon.com jalgaon.com;

    # Web root — CI/CD deploys the React build output here
    root /var/www/jalgaon-frontend;
    index index.html;

    # React SPA routing — ALL routes serve index.html
    # This is required because React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite-generated hashed asset files aggressively
    # Vite adds content hashes to filenames (e.g., index-BsX4Bc8g.js)
    # so it's 100% safe to cache them for 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — the browser must always fetch the latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
